<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Upload Foto Kambing - EUGENE-G</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

h1{
color:#2a6b47;
}

input{
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 15px;
background:#2a6b47;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

#preview{
margin-top:20px;
}

img{
max-width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Upload Foto Kambing</h1>

<p>Silakan unggah foto kambing dari samping untuk analisis morfometri.</p>

<input type="file" id="foto" accept="image/*">

<button onclick="tampilkanFoto()">Upload</button>

<div id="preview"></div>

<br>

<a href="pengukuran.html">
<button>Lanjut ke Panduan Pengukuran</button>
</a>

</div>

<script>

function tampilkanFoto(){

let fileInput = document.getElementById("foto")
let preview = document.getElementById("preview")

if(fileInput.files.length === 0){

preview.innerHTML = "Silakan pilih foto terlebih dahulu."

return

}

let file = fileInput.files[0]

let reader = new FileReader()

reader.onload = function(e){

preview.innerHTML =
"<h3>Foto Kambing</h3>" +
"<img src='"+e.target.result+"'>"

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
